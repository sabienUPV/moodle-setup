services:
  proxy-manager:
    image: 'jc21/nginx-proxy-manager:latest'
    container_name: nginx-proxy-manager
    restart: unless-stopped
    ports:
      - '80:80'
      - '443:443'
      - '81:81'
    volumes:
      - ./bind-mounts/proxy/data:/data
      - ./bind-mounts/proxy/letsencrypt:/etc/letsencrypt