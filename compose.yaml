services:
  moodle-db:
    image: mariadb:10.11
    container_name: moodle-db
    restart: unless-stopped
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    environment:
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
    volumes:
      - ./mariadb_data:/var/lib/mysql

  moodle:
    image: moodlehq/moodle-php-apache:8.3
    container_name: moodle-app
    restart: unless-stopped
    volumes:
      # Moodle source code tracked by Git
      - ./html:/var/www/html
      # Persistent files (user uploads, course files, etc.)
      - ./moodledata:/var/www/moodledata
      # Apache configuration for Moodle router (fixes 'CheckRouter not configured' warning and enables clean URLs)
      - ./apache-config/moodle-router.conf:/etc/apache2/conf-enabled/moodle-router.conf
    depends_on:
      - moodle-db