services:
  moodle-db:
    image: mariadb:10.11
    restart: unless-stopped
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    environment:
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
    volumes:
      # Managed Docker volume for database persistence
      - moodle_db_data:/var/lib/mysql

  moodle:
    build: .
    restart: unless-stopped
    environment:
      # Fixes zend.exception_ignore_args warning, removes sensitive information from logs in prod
      - PHP_INI-zend.exception_ignore_args=On
    volumes:
      # Managed Docker volume for persistent Moodle data (uploaded files, cache, etc.)
      - moodle_data:/var/www/moodledata
    depends_on:
      - moodle-db

  moodle-cron:
    build: .
    container_name: moodle-cron
    restart: unless-stopped
    environment:
      - PHP_INI-zend.exception_ignore_args=On
    volumes:
      - moodle_data:/var/www/moodledata
    depends_on:
      - moodle-db
    # Runs the Moodle cron task every minute instead of starting the Apache server
    command: >
      sh -c "while true; do php /var/www/html/admin/cli/cron.php; sleep 60; done"

volumes:
  moodle_db_data:
  moodle_data:
