# Moodle Router Configuration
# Ensures clean URLs work by redirecting not-found traffic to r.php
<Directory /var/www/html>
    AllowOverride All
    Require all granted
    DirectoryIndex index.php
    FallbackResource /r.php
</Directory>

# (Optional, but recommended by Moodle if your environment allows it)
# To force the DocumentRoot to point to /public and increase security
# Uncomment the following lines if all of Moodle runs under /public
# DocumentRoot /var/www/html/public
# <Directory /var/www/html/public>
#     AllowOverride All
#     Require all granted
#     DirectoryIndex index.php
#     FallbackResource /r.php
# </Directory>